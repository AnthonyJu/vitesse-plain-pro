packages: []

confirmModulesPurge: false

shellEmulator: true

trustPolicy: no-downgrade

trustPolicyExclude:
  - semver@6.3.1
  - '@trickfilm400/rollup-plugin-off-main-thread@3.0.0-pre1'

allowBuilds:
  '@parcel/watcher': true
  '@vaadin/vaadin-usage-statistics': true
  core-js: true
  es5-ext: true
  esbuild: true
  protobufjs: true
  simple-git-hooks: true
  vue-demi: true
